spring.application.name=informacion_presupuestaria
server.port=8091
spring.datasource.url=jdbc:mysql://localhost:3306/appmaestria
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# DevTools: no mostrar el "Condition evaluation delta" en cada reinicio
spring.devtools.restart.log-condition-evaluation-delta=false

# Configuración para ejecutar data.sql al iniciar la aplicación
# NOTA: Usar 'always' solo la primera vez para cargar datos iniciales.
# Después cambiar a 'never' para evitar que data.sql sobreescriba cambios en cada reinicio.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# Microservicio de matrícula académica (Gestión-matricula)
matricula.academica.base-url=http://localhost:8081

# Servicio externo de pagos (SIMCA/CINCA): stub por defecto hasta que exista endpoint
external.payments.mode=stub
external.payments.scheduler.enabled=false
external.payments.sync.codigos=
external.payments.sync.periodo=
# Cuando mode=http:
# external.payments.base-url=http://localhost:8080
# external.payments.path=/api/pagos
# external.payments.timeout-ms=10000
# external.payments.retry.max=2
# Scheduler (cron: 0 0 0 * * ? = medianoche diaria)
external.payments.scheduler.cron=0 0 0 * * ?
