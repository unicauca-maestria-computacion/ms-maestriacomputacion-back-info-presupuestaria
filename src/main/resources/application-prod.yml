spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  jwt-secret: ${JWT_SECRET:secretKey123}

matricula:
  financiera:
    base-url: ${MATRICULA_FINANCIERA_BASE_URL}
