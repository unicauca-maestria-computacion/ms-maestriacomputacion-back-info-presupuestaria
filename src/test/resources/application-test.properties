# Test configuration — uses Testcontainers MySQL and WireMock
# These values are overridden at runtime by BaseIntegrationTest

# Spring Boot will use the datasource URL injected by Testcontainers
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

# WireMock base URL — overridden at runtime by BaseIntegrationTest
matricula.financiera.base-url=http://localhost:8089
matricula.financiera.connect-timeout-ms=5000
matricula.financiera.read-timeout-ms=10000

# Disable DevTools restart in tests
spring.devtools.restart.enabled=false
